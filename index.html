<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拼多多数据看板</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #8a94a6;
      --line: #e5e7eb;
      --bg: #f3f4f6;
      --panel: #fff;
      --green: #4f9f7a;
      --blue: #4f8edb;
      --orange: #d97732;
      --red: #b42318;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--bg); }
    header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; background: #fff; border-bottom: 1px solid var(--line); }
    .brand { display: flex; gap: 12px; align-items: center; font-weight: 750; }
    .brand strong { color: #c0392b; font-size: 18px; }
    .brand span { color: var(--muted); border-left: 1px solid var(--line); padding-left: 12px; }
    .updated { color: var(--muted); font-size: 13px; }
    main { max-width: 1320px; margin: 0 auto; padding: 24px 28px 44px; }
    .tabs { display: flex; gap: 8px; padding: 14px 28px 0; background: #fff; border-bottom: 1px solid var(--line); }
    button { font: inherit; cursor: pointer; }
    .tab { border: 0; background: transparent; color: #667085; padding: 0 16px 13px; font-weight: 750; border-bottom: 3px solid transparent; }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }
    .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .controls label { color: #667085; font-size: 13px; font-weight: 750; }
    select { height: 38px; border: 1px solid var(--line); border-radius: 8px; padding: 0 12px; background: #fff; color: var(--ink); font: inherit; min-width: 160px; }
    .topline { display: flex; justify-content: space-between; gap: 14px; align-items: baseline; margin-bottom: 16px; }
    h1 { font-size: 22px; margin: 0; }
    h2 { font-size: 17px; margin: 0; }
    .hint { color: var(--muted); font-size: 13px; }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
    .card, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 1px 2px rgba(16,24,40,.04); }
    .card { padding: 16px 18px; min-height: 100px; }
    .card .label { color: var(--muted); font-size: 13px; font-weight: 700; }
    .card .value { margin-top: 8px; font-size: 30px; line-height: 1.05; font-weight: 800; }
    .card.green .value { color: var(--green); }
    .card.blue .value { color: var(--blue); }
    .card.orange .value { color: var(--orange); }
    .panel { padding: 18px; margin-bottom: 18px; }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; margin-bottom: 14px; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th { color: #667085; background: #f8fafc; font-weight: 750; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
    tbody tr:last-child td { border-bottom: 0; }
    details { border: 1px solid var(--line); border-radius: 10px; background: #fff; margin-bottom: 12px; overflow: hidden; }
    summary { list-style: none; cursor: pointer; padding: 16px 18px; display: grid; grid-template-columns: 1.15fr repeat(5, minmax(120px, 1fr)); gap: 12px; align-items: center; border-bottom: 1px solid transparent; }
    details[open] summary { border-bottom-color: var(--line); }
    summary::-webkit-details-marker { display: none; }
    .series-name { font-size: 18px; font-weight: 800; }
    .summary-metric .label { display: block; color: var(--muted); font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .summary-metric .value { font-weight: 800; }
    .metric-cell { min-width: 130px; line-height: 1.35; }
    .metric-cell .main { font-size: 15px; font-weight: 800; color: var(--ink); }
    .metric-cell .sub { margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 650; }
    .details-body { padding: 14px 16px 16px; }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 58px; height: 24px; border-radius: 999px; padding: 0 9px; font-size: 12px; font-weight: 800; }
    .badge.up { color: var(--red); background: #fff1f0; }
    .badge.down { color: #027a48; background: #ecfdf3; }
    .badge.flat { color: #667085; background: #f2f4f7; }
    .diagnosis { font-weight: 750; color: #344054; }
    .empty { color: var(--muted); padding: 22px; text-align: center; }
    .hidden { display: none; }
    @media (max-width: 900px) {
      header { display: block; height: auto; padding: 14px 18px; }
      .updated { margin-top: 6px; }
      main { padding: 18px; }
      .cards { grid-template-columns: 1fr 1fr; }
      summary { grid-template-columns: 1fr; }
      .tabs { padding-left: 18px; overflow-x: auto; }
      .controls { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><strong>拼多多数据看板</strong><span>系列经营日报</span></div>
    <div class="updated" id="updatedAt">读取中...</div>
  </header>
  <nav class="tabs">
    <button class="tab active" data-view="day">单日表现</button>
    <button class="tab" data-view="weeks">本月周趋势</button>
  </nav>
  <main>
    <section class="controls">
      <label for="viewSelect">查看口径</label>
      <select id="viewSelect"></select>
      <label for="dateSelect" id="dateSelectLabel">选择日期</label>
      <select id="dateSelect"></select>
    </section>

    <section id="dayView">
      <div class="topline">
        <h1>单日系列表现</h1>
        <div class="hint" id="latestDateText">最近有数据日期</div>
      </div>
      <section class="cards">
        <article class="card green"><div class="label" id="totalAmountLabel">单日总成交</div><div class="value" id="totalAmount">¥0.00</div></article>
        <article class="card blue"><div class="label" id="totalVisitorsLabel">单日总访客</div><div class="value" id="totalVisitors">0</div></article>
        <article class="card orange"><div class="label" id="totalCvrLabel">单日加权转化率</div><div class="value" id="totalCvr">0.00%</div></article>
        <article class="card"><div class="label">监控系列 / 商品</div><div class="value" id="totalCount">0 / 0</div></article>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>系列总览与 ID 构成</h2>
          <span class="hint">展开系列可查看具体 ID 的表现和原因</span>
        </div>
        <div id="seriesBlocks"></div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>近 7 天系列日销</h2>
          <span class="hint" id="last7Text">按当前日期向前追踪</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="last7Head"></thead>
            <tbody id="last7Rows"></tbody>
          </table>
        </div>
      </section>
    </section>

    <section id="weeksView" class="hidden">
      <div class="topline">
        <h1>本月周维度跟踪</h1>
        <div class="hint" id="weekMonthText">按最新数据月份统计</div>
      </div>
      <section class="panel">
        <div class="panel-head">
          <h2>系列周趋势</h2>
          <span class="hint">周维度按自然月 1-7、8-14、15-21、22-月底汇总</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="seriesWeekHead"></thead>
            <tbody id="seriesWeekRows"></tbody>
          </table>
        </div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>ID 周趋势明细</h2>
          <span class="hint">用于定位系列内哪个 ID 拉动或拖累</span>
        </div>
        <div id="idWeekBlocks"></div>
      </section>
    </section>
  </main>

  <script>
    const SERIES = {
      "907458671037": "无水酵素",
      "917048822440": "无水酵素",
      "911804836948": "红花清火",
      "932697304345": "小香管",
      "933599709509": "小香管",
      "942700333004": "小香管",
      "943153713868": "小香管",
      "39194042": "专效"
    };
    const NAME_FIX = { "933599709509": "官旗小香管+光泽次链" };
    const SERIES_ORDER = ["小香管", "无水酵素", "红花清火", "专效"];
    const money = (v) => Number(v || 0).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const int = (v) => Number(v || 0).toLocaleString("zh-CN");
    const pct = (v) => `${Number(v || 0).toFixed(2)}%`;
    const wan = (v) => `${(Number(v || 0) / 10000).toFixed(1)}万`;
    const moneyWan = (v) => `¥${wan(v)}`;
    const state = { data: null, view: "day", selectedDate: "" };

    function allItems() {
      return Object.values(state.data?.stores || {}).flatMap((store) =>
        Object.values(store.goods || {}).map((goods) => ({
          ...goods,
          name: NAME_FIX[goods.goodsId] || goods.name,
          storeName: store.storeName,
          series: SERIES[goods.goodsId] || "未分类"
        }))
      );
    }

    function allDates() {
      return [...new Set(allItems().flatMap((goods) => (goods.records || []).map((row) => row.date)))].sort();
    }

    function latestDate() {
      return allDates().at(-1) || "";
    }

    function selectedDate() {
      return state.selectedDate || latestDate();
    }

    function allMonths() {
      return [...new Set(allDates().map((date) => date.slice(0, 7)))].sort();
    }

    function renderViewOptions() {
      const months = allMonths();
      const latestMonth = monthOfLatest();
      const options = [
        { value: "day", label: "单日表现" },
        { value: "last7", label: "近7天累计" },
        ...months.map((month) => ({
          value: `month:${month}`,
          label: month === latestMonth ? `${month} 截至最新` : `${month} 整月`
        })),
        { value: "weeks", label: "本月周趋势" }
      ];
      const select = document.getElementById("viewSelect");
      select.innerHTML = options.map((option) => `<option value="${option.value}">${option.label}</option>`).join("");
      if (!options.some((option) => option.value === state.view)) state.view = "day";
      select.value = state.view;
    }

    function previousRecord(goods, date) {
      return [...(goods.records || [])].filter((row) => row.date < date).sort((a, b) => b.date.localeCompare(a.date))[0] || null;
    }

    function aggregate(rows) {
      const amount = rows.reduce((s, r) => s + Number(r.amount || 0), 0);
      const visitors = rows.reduce((s, r) => s + Number(r.visitors || 0), 0);
      const cvr = visitors ? rows.reduce((s, r) => s + Number(r.conversionRate || 0) * Number(r.visitors || 0), 0) / visitors : 0;
      return { amount, visitors, cvr, count: rows.length };
    }

    function changePct(current, previous) {
      if (!previous) return null;
      return (Number(current || 0) - Number(previous || 0)) / Math.abs(Number(previous || 0)) * 100;
    }

    function estimatedAov(row) {
      const orders = Number(row.visitors || 0) * Number(row.conversionRate || 0) / 100;
      return orders ? Number(row.amount || 0) / orders : 0;
    }

    function badge(value, suffix = "%") {
      if (value === null || !Number.isFinite(value)) return `<span class="badge flat">新增</span>`;
      const cls = Math.abs(value) < 1 ? "flat" : value > 0 ? "up" : "down";
      const sign = value > 0 ? "+" : "";
      return `<span class="badge ${cls}">${sign}${value.toFixed(1)}${suffix}</span>`;
    }

    function diagnosis(row, prev) {
      if (!prev) return "新数据，暂无对比";
      const amountChg = changePct(row.amount, prev.amount) || 0;
      const visitorChg = changePct(row.visitors, prev.visitors) || 0;
      const cvrChg = Number(row.conversionRate || 0) - Number(prev.conversionRate || 0);
      const aovChg = changePct(estimatedAov(row), estimatedAov(prev)) || 0;
      if (Math.abs(amountChg) < 8) return "金额基本稳定";
      const reasons = [];
      if (amountChg < 0) {
        if (visitorChg < -8) reasons.push("访客下降");
        if (cvrChg < -1) reasons.push("转化率下降");
        if (aovChg < -8) reasons.push("客单价下降");
        return reasons.length ? reasons.join(" + ") : "金额下降，需看明细";
      }
      if (visitorChg > 8) reasons.push("访客增长");
      if (cvrChg > 1) reasons.push("转化率提升");
      if (aovChg > 8) reasons.push("客单价提升");
      return reasons.length ? reasons.join(" + ") : "金额增长，结构均衡";
    }

    function periodDiagnosis(current, previous) {
      if (!previous || !previous.amount) return "暂无上周对比";
      const amountChg = changePct(current.amount, previous.amount) || 0;
      const visitorChg = changePct(current.visitors, previous.visitors) || 0;
      const cvrChg = Number(current.cvr || 0) - Number(previous.cvr || 0);
      if (Math.abs(amountChg) < 8) return "本周基本稳定";
      const direction = amountChg > 0 ? "增长" : "下降";
      const reasons = [];
      if (amountChg > 0) {
        if (visitorChg > 8) reasons.push("访客拉动");
        if (cvrChg > 1) reasons.push("转化提升");
      } else {
        if (visitorChg < -8) reasons.push("访客拖累");
        if (cvrChg < -1) reasons.push("转化拖累");
      }
      return reasons.length ? `${direction}：${reasons.join(" + ")}` : `${direction}：需看 ID 构成`;
    }

    function groupBySeries(items) {
      const map = new Map();
      items.forEach((item) => {
        if (!map.has(item.series)) map.set(item.series, []);
        map.get(item.series).push(item);
      });
      return [...map.entries()].sort((a, b) => SERIES_ORDER.indexOf(a[0]) - SERIES_ORDER.indexOf(b[0]));
    }

    function rowFor(goods, date) {
      const row = (goods.records || []).find((record) => record.date === date);
      return row ? { ...row, goods } : null;
    }

    function renderDateOptions() {
      const dates = allDates();
      const select = document.getElementById("dateSelect");
      select.innerHTML = dates.map((date) => `<option value="${date}">${date}</option>`).join("");
      if (!state.selectedDate || !dates.includes(state.selectedDate)) state.selectedDate = dates.at(-1) || "";
      select.value = state.selectedDate;
      document.getElementById("dateSelect").classList.toggle("hidden", state.view !== "day");
      document.getElementById("dateSelectLabel").classList.toggle("hidden", state.view !== "day");
    }

    function periodForView() {
      if (state.view === "last7") {
        const dates = lastNDatesUntil(latestDate(), 7);
        return {
          title: "近7天系列表现",
          hint: dates.length ? `${dates[0]} 至 ${dates.at(-1)}` : "暂无数据",
          dates,
          label: "近7天",
          previousDates: previousNDatesBefore(dates[0], dates.length)
        };
      }
      if (state.view.startsWith("month:")) {
        const month = state.view.slice(6);
        const dates = allDates().filter((date) => date.startsWith(month));
        const latestMonth = monthOfLatest();
        return {
          title: month === latestMonth ? "本月截至最新系列表现" : `${month} 整月系列表现`,
          hint: dates.length ? `${month}，截至 ${dates.at(-1)}` : `${month} 暂无数据`,
          dates,
          label: month === latestMonth ? "本月截至最新" : "整月",
          previousDates: previousMonthDates(month)
        };
      }
      return null;
    }

    function previousNDatesBefore(firstDate, n) {
      if (!firstDate) return [];
      const dates = allDates().filter((date) => date < firstDate);
      return dates.slice(Math.max(0, dates.length - n));
    }

    function previousMonthDates(month) {
      const [year, mon] = month.split("-").map(Number);
      const prev = new Date(year, mon - 2, 1);
      const prevMonth = `${prev.getFullYear()}-${String(prev.getMonth() + 1).padStart(2, "0")}`;
      return allDates().filter((date) => date.startsWith(prevMonth));
    }

    function recordsForDates(goods, dates) {
      return (goods.records || []).filter((row) => dates.includes(row.date));
    }

    function aggregateForGoods(goods, dates) {
      const agg = aggregate(recordsForDates(goods, dates));
      return {
        date: dates.length ? `${dates[0]}~${dates.at(-1)}` : "",
        amount: agg.amount,
        visitors: agg.visitors,
        conversionRate: agg.cvr,
        cvr: agg.cvr,
        count: agg.count,
        goods
      };
    }

    function renderDay() {
      const period = periodForView();
      if (period) {
        renderPeriod(period);
        return;
      }
      const date = selectedDate();
      const items = allItems();
      const latestRows = items.map((goods) => rowFor(goods, date)).filter(Boolean);
      const total = aggregate(latestRows);
      document.querySelector("#dayView h1").textContent = "单日系列表现";
      document.getElementById("latestDateText").textContent = date ? `当前查看日期：${date}` : "暂无数据";
      document.getElementById("totalAmountLabel").textContent = "单日总成交";
      document.getElementById("totalVisitorsLabel").textContent = "单日总访客";
      document.getElementById("totalCvrLabel").textContent = "单日加权转化率";
      document.getElementById("totalAmount").textContent = moneyWan(total.amount);
      document.getElementById("totalVisitors").textContent = wan(total.visitors);
      document.getElementById("totalCvr").textContent = pct(total.cvr);
      document.getElementById("totalCount").textContent = `${int(new Set(items.map((i) => i.series)).size)} / ${int(items.length)}`;

      document.getElementById("seriesBlocks").innerHTML = groupBySeries(items).map(([series, goodsItems]) => {
        const rows = goodsItems.map((goods) => rowFor(goods, date)).filter(Boolean);
        const prevRows = goodsItems.map((goods) => {
          const prev = previousRecord(goods, date);
          return prev ? { ...prev, goods } : null;
        }).filter(Boolean);
        const current = aggregate(rows);
        const prev = aggregate(prevRows);
        const amountChg = changePct(current.amount, prev.amount);
        const enriched = rows.map((row) => {
          const prevRow = previousRecord(row.goods, date);
          return { ...row, prev: prevRow, amountChg: changePct(row.amount, prevRow?.amount) };
        }).sort((a, b) => Math.abs(b.amountChg || 0) - Math.abs(a.amountChg || 0));
        const pull = enriched.find((row) => (row.amountChg || 0) > 8);
        const drag = enriched.find((row) => (row.amountChg || 0) < -8);
        const keyText = [pull ? `拉动：${pull.goods.name}` : "", drag ? `拖累：${drag.goods.name}` : ""].filter(Boolean).join("；") || "结构稳定";
        const seriesDiag = diagnosis(current, prev);
        return `<details open>
          <summary>
            <div class="series-name">${series}</div>
            <div class="summary-metric"><span class="label">单日成交</span><span class="value">${moneyWan(current.amount)}</span></div>
            <div class="summary-metric"><span class="label">单日访客</span><span class="value">${wan(current.visitors)}</span></div>
            <div class="summary-metric"><span class="label">加权转化率</span><span class="value">${pct(current.cvr)}</span></div>
            <div class="summary-metric"><span class="label">金额变化</span><span class="value">${badge(amountChg)}</span></div>
            <div class="summary-metric"><span class="label">初判</span><span class="value">${seriesDiag}</span></div>
          </summary>
          <div class="details-body">
            <div class="hint" style="margin-bottom:10px">${keyText}</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>店铺</th><th>商品</th><th>商品ID</th><th>成交金额</th><th>访客数</th><th>转化率</th><th>金额变化</th><th>原因</th></tr></thead>
                <tbody>${enriched.map((row) => `<tr>
                  <td>${row.goods.storeName}</td><td>${row.goods.name}</td><td>${row.goods.goodsId}</td>
                  <td>${moneyWan(row.amount)}</td><td>${wan(row.visitors)}</td><td>${pct(row.conversionRate)}</td>
                  <td>${badge(row.amountChg)}</td><td class="diagnosis">${diagnosis(row, row.prev)}</td>
                </tr>`).join("")}</tbody>
              </table>
            </div>
          </div>
        </details>`;
      }).join("");

      renderLast7(date, items);
    }

    function renderPeriod(period) {
      const items = allItems();
      const totalRows = items.flatMap((goods) => recordsForDates(goods, period.dates));
      const total = aggregate(totalRows);
      document.querySelector("#dayView h1").textContent = period.title;
      document.getElementById("latestDateText").textContent = period.hint;
      document.getElementById("totalAmountLabel").textContent = `${period.label}总成交`;
      document.getElementById("totalVisitorsLabel").textContent = `${period.label}总访客`;
      document.getElementById("totalCvrLabel").textContent = `${period.label}加权转化率`;
      document.getElementById("totalAmount").textContent = moneyWan(total.amount);
      document.getElementById("totalVisitors").textContent = wan(total.visitors);
      document.getElementById("totalCvr").textContent = pct(total.cvr);
      document.getElementById("totalCount").textContent = `${int(new Set(items.map((i) => i.series)).size)} / ${int(items.length)}`;

      document.getElementById("seriesBlocks").innerHTML = groupBySeries(items).map(([series, goodsItems]) => {
        const rows = goodsItems.map((goods) => aggregateForGoods(goods, period.dates)).filter((row) => row.count);
        const prevRows = goodsItems.map((goods) => aggregateForGoods(goods, period.previousDates)).filter((row) => row.count);
        const current = aggregate(rows);
        const prev = aggregate(prevRows);
        const amountChg = changePct(current.amount, prev.amount);
        const enriched = rows.map((row) => {
          const prevRow = aggregateForGoods(row.goods, period.previousDates);
          return { ...row, prev: prevRow.count ? prevRow : null, amountChg: changePct(row.amount, prevRow.amount) };
        }).sort((a, b) => Math.abs(b.amountChg || 0) - Math.abs(a.amountChg || 0));
        const pull = enriched.find((row) => (row.amountChg || 0) > 8);
        const drag = enriched.find((row) => (row.amountChg || 0) < -8);
        const keyText = [pull ? `拉动：${pull.goods.name}` : "", drag ? `拖累：${drag.goods.name}` : ""].filter(Boolean).join("；") || "结构稳定";
        const seriesDiag = periodDiagnosis(current, prev);
        return `<details open>
          <summary>
            <div class="series-name">${series}</div>
            <div class="summary-metric"><span class="label">${period.label}成交</span><span class="value">${moneyWan(current.amount)}</span></div>
            <div class="summary-metric"><span class="label">${period.label}访客</span><span class="value">${wan(current.visitors)}</span></div>
            <div class="summary-metric"><span class="label">加权转化率</span><span class="value">${pct(current.cvr)}</span></div>
            <div class="summary-metric"><span class="label">金额变化</span><span class="value">${badge(amountChg)}</span></div>
            <div class="summary-metric"><span class="label">初判</span><span class="value">${seriesDiag}</span></div>
          </summary>
          <div class="details-body">
            <div class="hint" style="margin-bottom:10px">${keyText}</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>店铺</th><th>商品</th><th>商品ID</th><th>成交金额</th><th>访客数</th><th>转化率</th><th>金额变化</th><th>原因</th></tr></thead>
                <tbody>${enriched.map((row) => `<tr>
                  <td>${row.goods.storeName}</td><td>${row.goods.name}</td><td>${row.goods.goodsId}</td>
                  <td>${moneyWan(row.amount)}</td><td>${wan(row.visitors)}</td><td>${pct(row.conversionRate)}</td>
                  <td>${badge(row.amountChg)}</td><td class="diagnosis">${periodDiagnosis(row, row.prev)}</td>
                </tr>`).join("")}</tbody>
              </table>
            </div>
          </div>
        </details>`;
      }).join("");

      renderLast7(latestDate(), items);
    }

    function lastNDatesUntil(date, n) {
      const dates = allDates().filter((d) => d <= date);
      return dates.slice(Math.max(0, dates.length - n));
    }

    function renderLast7(date, items) {
      const dates = lastNDatesUntil(date, 7);
      document.getElementById("last7Text").textContent = dates.length ? `${dates[0]} 至 ${dates.at(-1)}` : "暂无数据";
      document.getElementById("last7Head").innerHTML = `<tr><th>系列</th>${dates.map((d) => `<th>${d.slice(5)}<br><span class="hint">成交 / 访客 / 转化</span></th>`).join("")}<th>7日合计</th><th>趋势判断</th></tr>`;
      document.getElementById("last7Rows").innerHTML = groupBySeries(items).map(([series, goodsItems]) => {
        const dayAggs = dates.map((d) => aggregate(goodsItems.map((goods) => rowFor(goods, d)).filter(Boolean)));
        const total = aggregate(goodsItems.flatMap((goods) => (goods.records || []).filter((row) => dates.includes(row.date))));
        const first = dayAggs.find((agg) => agg.count);
        const last = [...dayAggs].reverse().find((agg) => agg.count);
        const trend = first && last && first !== last ? periodDiagnosis(last, first) : "数据较少，继续观察";
        const cells = dayAggs.map((agg) => `<td>${agg.count ? `${moneyWan(agg.amount)}<br><span class="hint">${wan(agg.visitors)} / ${pct(agg.cvr)}</span>` : "-"}</td>`).join("");
        return `<tr><td>${series}</td>${cells}<td>${moneyWan(total.amount)}<br><span class="hint">${wan(total.visitors)} / ${pct(total.cvr)}</span></td><td class="diagnosis">${trend}</td></tr>`;
      }).join("");
    }

    function weekIndex(date) {
      const day = Number(date.slice(8, 10));
      if (day <= 7) return 1;
      if (day <= 14) return 2;
      if (day <= 21) return 3;
      return 4;
    }

    function weekLabel(month, week) {
      const y = Number(month.slice(0, 4));
      const m = Number(month.slice(5));
      const lastDay = new Date(y, m, 0).getDate();
      const ranges = [
        [1, 7],
        [8, 14],
        [15, 21],
        [22, lastDay]
      ];
      const [start, end] = ranges[week - 1];
      return `${m}/${start}-${m}/${end}`;
    }

    function monthOfLatest() {
      return latestDate().slice(0, 7);
    }

    function weekBuckets(records, month) {
      const buckets = [1, 2, 3, 4].map((week) => ({ week, rows: [] }));
      records.filter((row) => row.date.startsWith(month)).forEach((row) => buckets[weekIndex(row.date) - 1].rows.push(row));
      return buckets;
    }

    function weekCells(records, month) {
      return weekBuckets(records, month).map((bucket) => {
        const agg = aggregate(bucket.rows);
        return `<td>${bucket.rows.length ? `<div class="metric-cell"><div class="main">成交 ${wan(agg.amount)}</div><div class="sub">访客 ${wan(agg.visitors)}｜转化 ${pct(agg.cvr)}</div></div>` : "-"}</td>`;
      }).join("");
    }

    function renderWeeks() {
      const month = monthOfLatest();
      const items = allItems();
      document.getElementById("weekMonthText").textContent = month ? `${month} 周维度，截至 ${latestDate()}` : "暂无数据";
      const weekHeaders = [1, 2, 3, 4].map((w) => `<th>第${w}周<br><span class="hint">${weekLabel(month, w)} · 成交 / 访客 / 转化</span></th>`).join("");
      document.getElementById("seriesWeekHead").innerHTML = `<tr><th>系列</th>${weekHeaders}<th>本月累计</th><th>最新周环比</th><th>周趋势判断</th><th>主要 ID</th></tr>`;
      document.getElementById("seriesWeekRows").innerHTML = groupBySeries(items).map(([series, goodsItems]) => {
        const records = goodsItems.flatMap((goods) => (goods.records || []));
        const buckets = weekBuckets(records, month);
        const monthAgg = aggregate(records.filter((row) => row.date.startsWith(month)));
        const filled = buckets.filter((bucket) => bucket.rows.length).map((bucket) => aggregate(bucket.rows));
        const latest = filled.at(-1);
        const previous = filled.length >= 2 ? filled.at(-2) : null;
        const wow = latest && previous ? changePct(latest.amount, previous.amount) : null;
        const latestWeek = buckets.filter((bucket) => bucket.rows.length).at(-1);
        const byGoods = goodsItems.map((goods) => {
          const current = aggregate((goods.records || []).filter((row) => row.date.startsWith(month) && weekIndex(row.date) === latestWeek?.week));
          const prev = aggregate((goods.records || []).filter((row) => row.date.startsWith(month) && weekIndex(row.date) === (latestWeek?.week || 0) - 1));
          return { goods, current, change: changePct(current.amount, prev.amount) };
        }).filter((item) => item.current.count).sort((a, b) => Math.abs(b.change || 0) - Math.abs(a.change || 0));
        const keyGoods = byGoods[0] ? `${byGoods[0].change >= 0 ? "拉动" : "拖累"}：${byGoods[0].goods.name}` : "-";
        return `<tr><td>${series}</td>${weekCells(records, month)}<td><div class="metric-cell"><div class="main">成交 ${wan(monthAgg.amount)}</div><div class="sub">访客 ${wan(monthAgg.visitors)}｜转化 ${pct(monthAgg.cvr)}</div></div></td><td>${badge(wow)}</td><td class="diagnosis">${periodDiagnosis(latest, previous)}</td><td class="diagnosis">${keyGoods}</td></tr>`;
      }).join("");

      document.getElementById("idWeekBlocks").innerHTML = groupBySeries(items).map(([series, goodsItems]) => `<details>
        <summary>
          <div class="series-name">${series}</div>
          <div class="summary-metric"><span class="label">ID 数</span><span class="value">${goodsItems.length}</span></div>
          <div class="summary-metric"><span class="label">查看</span><span class="value">展开明细</span></div>
        </summary>
        <div class="details-body">
          <div class="table-wrap">
            <table>
              <thead><tr><th>店铺</th><th>商品</th><th>商品ID</th>${weekHeaders}<th>本月累计</th><th>最新周环比</th><th>周趋势判断</th></tr></thead>
              <tbody>${goodsItems.map((goods) => {
                const records = goods.records || [];
                const buckets = weekBuckets(records, month);
                const monthAgg = aggregate(records.filter((row) => row.date.startsWith(month)));
                const filled = buckets.filter((bucket) => bucket.rows.length).map((bucket) => aggregate(bucket.rows));
                const latest = filled.at(-1);
                const previous = filled.length >= 2 ? filled.at(-2) : null;
                const wow = latest && previous ? changePct(latest.amount, previous.amount) : null;
                return `<tr><td>${goods.storeName}</td><td>${goods.name}</td><td>${goods.goodsId}</td>${weekCells(records, month)}<td><div class="metric-cell"><div class="main">成交 ${wan(monthAgg.amount)}</div><div class="sub">访客 ${wan(monthAgg.visitors)}｜转化 ${pct(monthAgg.cvr)}</div></div></td><td>${badge(wow)}</td><td class="diagnosis">${periodDiagnosis(latest, previous)}</td></tr>`;
              }).join("")}</tbody>
            </table>
          </div>
        </div>
      </details>`).join("");
    }

    function render() {
      renderViewOptions();
      renderDateOptions();
      renderDay();
      renderWeeks();
      document.getElementById("dayView").classList.toggle("hidden", state.view === "weeks");
      document.getElementById("weeksView").classList.toggle("hidden", state.view !== "weeks");
    }

    function setView(view) {
      state.view = view;
      document.getElementById("viewSelect").value = view;
      document.querySelectorAll(".tab").forEach((tab) => {
        const active = view === "weeks" ? tab.dataset.view === "weeks" : tab.dataset.view === "day";
        tab.classList.toggle("active", active);
      });
      render();
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.onclick = () => setView(button.dataset.view);
    });
    document.getElementById("viewSelect").onchange = (event) => setView(event.target.value);
    document.getElementById("dateSelect").onchange = (event) => {
      state.selectedDate = event.target.value;
      render();
    };

    fetch("pdd_data.json?ts=" + Date.now())
      .then((response) => response.json())
      .then((data) => {
        state.data = data;
        document.getElementById("updatedAt").textContent = `更新：${data.updatedAt || "暂无"}`;
        render();
      })
      .catch((error) => {
        document.getElementById("updatedAt").textContent = "读取 pdd_data.json 失败";
        document.querySelector("main").innerHTML = `<section class="panel"><div class="empty">${error.message}</div></section>`;
      });
  </script>
</body>
</html>
